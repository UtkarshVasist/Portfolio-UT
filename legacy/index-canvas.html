      if (n._sx == null) continue;
      const dx = cx - n._sx, dy = cy - n._sy;
      if (dx * dx + dy * dy < (CONFIG.HOVER_RADIUS + 4) * (CONFIG.HOVER_RADIUS + 4)) {
        this.hoverNPC = n;
        this.hoverQuoteIdx = Math.floor(Math.random() * n.quotes.length);
        this.touchHoverUntil = this.t + CONFIG.TOUCH_HOVER_TIME;
        return;
      }
    }
    if (this.isOverPrompt(cx, cy)) { this.pendingEnter = null; this.buildings.enter(this.ui.promptRect.b); return; }
    const w = this.renderer.screenToWorld(cx, cy);
    const g = this.renderer.unproject(w.x, w.y);
    const tx = Math.floor(g.x), ty = Math.floor(g.y);
    if (!this.world.inBounds(tx, ty)) return;
    const b = this.world.buildingAtTile(tx, ty);
    const o = this.player.planOrigin();
    this.pendingEnter = null;
    if (b) {
      // always walk to the building's front door, then auto-enter on arrival
      if (o.x === b.door.x && o.y === b.door.y) { this.buildings.enter(b); return; }
      const path = this.world.findPath(o.x, o.y, b.door.x, b.door.y);
      if (path) {
        this.player.setPath(path);
        this.pendingEnter = b;
        this.clickFx = { gx: b.door.x, gy: b.door.y, age: 0 };
      }
    } else if (this.world.isWalkable(tx, ty)) {
      this.player.setPath(this.world.findPath(o.x, o.y, tx, ty));
      this.clickFx = { gx: tx, gy: ty, age: 0 };
    }
  }

  /* ---------- main loop ---------- */
  frame(now) {
    const dt = Math.min((now - this.last) / 1000, 0.05);
    this.last = now;
    this.t += dt;
    const r = this.renderer, ctx = r.ctx;

    // -- update --------------------------------------------------
    this.player.update(dt, this.input);
    if (this.pendingEnter && !this.player.target && this.player.path.length === 0) {
      const b = this.pendingEnter;
      this.pendingEnter = null;
      if (this.player.tx === b.door.x && this.player.ty === b.door.y) {
        this.player.facing = b.door.face;
        this.buildings.enter(b);
      }
    }
    this.buildings.update(this.player);
    this.particles.update(dt);
    this.ui.update(dt);
    this.ui.setHud(this.buildings.near);
    if (this.touchHoverUntil && this.t > this.touchHoverUntil) { this.hoverNPC = null; this.touchHoverUntil = 0; }
    const pc = P(this.player.x + 0.5, this.player.y + 0.5);
    const k = Math.min(1, dt * CONFIG.CAM_LERP);
    r.cam.x += (pc.x - r.cam.x) * k;
    r.cam.y += (pc.y - 40 - r.cam.y) * k;

    // NPC screen anchors for hover/tap hit-testing, refreshed every frame
    for (const n of NPCS) {
      const s = r.worldToScreen(n._wx != null ? n._wx : P(n.gx + 0.5, n.gy + 0.5).x, n._wy != null ? n._wy : P(n.gx + 0.5, n.gy + 0.5).y);
      n._sx = s.x; n._sy = s.y;
    }

    // -- render --------------------------------------------------
    ctx.setTransform(r.dpr, 0, 0, r.dpr, 0, 0);
    this.atmosphere.drawSky(ctx, this.t);

    r.begin();
    this.world.drawGround(r, this.t);

    if (this.clickFx) {
      this.clickFx.age += dt;
      if (this.clickFx.age > 0.5) this.clickFx = null;
      else {
        const kk = this.clickFx.age / 0.5;
        const c = P(this.clickFx.gx + 0.5, this.clickFx.gy + 0.5);
        ctx.strokeStyle = 'rgba(255,140,0,' + (0.5 * (1 - kk)) + ')';
        ctx.lineWidth = 1.5;
        poly(ctx, [
          { x: c.x, y: c.y - HH * kk }, { x: c.x + HW * kk, y: c.y },
          { x: c.x, y: c.y + HH * kk }, { x: c.x - HW * kk, y: c.y },
        ], null, ctx.strokeStyle, 1.5);
      }
    }

    const vb = r.viewBounds(320);
    const list = [];
    for (const e of this.entities) {
      const p0 = P(e.minX, e.minY), p1 = P(e.maxX + 1, e.maxY + 1);
      const cx2 = (p0.x + p1.x) / 2, cy2 = (p0.y + p1.y) / 2;
      if (cx2 < vb.l || cx2 > vb.r || cy2 < vb.t || cy2 > vb.b2) continue;
      list.push(e);
    }
    const px = this.player.x, py = this.player.y;
    list.push({ minX: px, minY: py, maxX: px, maxY: py, draw: (c, t) => this.player.draw(c, t) });
    list.sort((a, b2) => {
      if (a.minX > b2.maxX || a.minY > b2.maxY) return 1;
      if (b2.minX > a.maxX || b2.minY > a.maxY) return -1;
      return (a.maxX + a.maxY) - (b2.maxX + b2.maxY);
    });
    for (const e of list) e.draw(ctx, this.t);

    this.atmosphere.drawWires(ctx, this.t);
    this.particles.draw(ctx);
    this.atmosphere.drawFog(ctx, dt);
    this.ui.drawLabels(ctx, this.buildings, this.t);
    r.end();

    // -- screen-space finish -------------------------------------
    this.atmosphere.drawRain(ctx, dt);
    this.ui.drawScreenFx(ctx);
    this.atmosphere.drawGrain(ctx, this.t);
    this.minimap.draw(ctx, this.player);
    if (this.hoverNPC) this.ui.drawHoverTip(ctx, this.hoverNPC, this.hoverNPC.quotes[this.hoverQuoteIdx % this.hoverNPC.quotes.length]);

    requestAnimationFrame((n) => this.frame(n));
  }
}

window.game = new Game();   // exposed for debugging in the console
</script>
</body>
