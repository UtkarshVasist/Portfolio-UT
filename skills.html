<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skills — Portfolio City</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌃</text></svg>" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05060a; color: #e8d9b0;
    font-family: "Courier New", monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .card { max-width: 640px; width: 100%; }
  .kicker { color: #c5a028; letter-spacing: 3px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    color: #ffb347; font-size: clamp(32px, 6vw, 48px); letter-spacing: 0.08em;
    margin: 8px 0 24px; text-shadow: 0 0 18px rgba(255,140,0,0.35);
  }
  ul { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
  li {
    border: 1px solid rgba(197,160,40,0.35); border-radius: 6px; padding: 10px 12px;
    color: #d9c98a; font-size: 13px; letter-spacing: 0.5px;
  }
  .placeholder-note {
    border: 1px dashed rgba(197,160,40,0.4); border-radius: 6px;
    padding: 14px 16px; margin: 24px 0; color: rgba(232,217,176,0.65); font-size: 13px;
  }
  a.back {
    display: inline-block; margin-top: 16px; color: #ff8c00; text-decoration: none;
    border: 1px solid #ff8c00; border-radius: 4px; padding: 8px 14px; font-size: 13px;
    letter-spacing: 1px; transition: box-shadow 0.2s;
  }
  a.back:hover { box-shadow: 0 0 12px rgba(255,140,0,0.5); }
</style>
</head>
<body>
<div class="card">
  <div class="kicker">Expertise</div>
  <h1>SKILLS</h1>
  <ul>
    <li>Skill one</li>
    <li>Skill two</li>
    <li>Skill three</li>
    <li>Skill four</li>
    <li>Skill five</li>
    <li>Skill six</li>
  </ul>
  <div class="placeholder-note">Placeholder page — swap these tiles for your real skills/tools.</div>
  <a class="back" href="index.html">&larr; Back to Portfolio City</a>
</div>
</body>
</html>
