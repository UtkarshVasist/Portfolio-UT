<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Résumé — Portfolio City</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌃</text></svg>" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05060a; color: #e8d9b0;
    font-family: "Courier New", monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .card { max-width: 640px; width: 100%; }
  .kicker { color: #ff6b00; letter-spacing: 3px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    color: #ffb347; font-size: clamp(32px, 6vw, 48px); letter-spacing: 0.08em;
    margin: 8px 0 24px; text-shadow: 0 0 18px rgba(255,140,0,0.35);
  }
  p { line-height: 1.7; color: #cbbf9c; margin-bottom: 16px; }
  .btn {
    display: inline-block; color: #05060a; background: #ff8c00; text-decoration: none;
    border-radius: 4px; padding: 10px 16px; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; margin-top: 6px;
  }
  .placeholder-note {
    border: 1px dashed rgba(255,107,0,0.4); border-radius: 6px;
    padding: 14px 16px; margin: 24px 0; color: rgba(232,217,176,0.65); font-size: 13px;
  }
  a.back {
    display: block; margin-top: 20px; color: #ff8c00; text-decoration: none;
    border: 1px solid #ff8c00; border-radius: 4px; padding: 8px 14px; font-size: 13px;
    letter-spacing: 1px; width: fit-content; transition: box-shadow 0.2s;
  }
  a.back:hover { box-shadow: 0 0 12px rgba(255,140,0,0.5); }
</style>
</head>
<body>
<div class="card">
  <div class="kicker">Résumé</div>
  <h1>RESUME</h1>
  <p>Drop a link to your PDF résumé here, or lay out an HTML version — whichever you'd rather maintain.</p>
  <a class="btn" href="#">Download Résumé (PDF)</a>
  <div class="placeholder-note">Placeholder page — link this button to your real résumé file.</div>
  <a class="back" href="index.html">&larr; Back to Portfolio City</a>
</div>
</body>
</html>
